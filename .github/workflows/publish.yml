name: Publish to npm

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'npm dist-tag (latest, preview, beta)'
        required: true
        default: 'preview'
        type: choice
        options:
          - latest
          - preview
          - beta

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      # `id-token: write` is required for npm provenance via OIDC.
      # Configure npm Trusted Publisher pointing at this workflow to use it.
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify dist/ output
        run: |
          set -e
          test -f dist/nodes/Scopebound/Scopebound.node.js
          test -f dist/credentials/ScopeboundApi.credentials.js
          test -f dist/nodes/Scopebound/scopebound.svg
          echo "✔ All expected build artifacts present"

      - name: Determine npm tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.ref_name }}" == *"preview"* ]]; then
            echo "tag=preview" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.ref_name }}" == *"beta"* ]]; then
            echo "tag=beta" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.ref_name }}" == *"alpha"* ]]; then
            echo "tag=alpha" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm with provenance
        run: npm publish --access public --provenance --tag ${{ steps.tag.outputs.tag }}
